name: Postman API Tests

on:
  push:
  workflow_dispatch:

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Collection
        run: |
          newman run postman/Restful-Booker-API Testing.postman_collection.json \
            -e "postman/Restful-Booker-Testing.postman_environment.json" \
            --reporters cli,junit \
            --reporter-junit-export results.xml